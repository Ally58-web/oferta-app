<div id="oferta-calc">
<style>
  #oferta-calc {
    --ink: #1a1a1a;
    --muted: #6b6b66;
    --line: #e2e0d8;
    --surface: #faf9f5;
    --accent: #2f5d4f;
    --accent-ink: #ffffff;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--surface);
    color: var(--ink);
    padding: 24px 16px;
    border-radius: 16px;
    max-width: 640px;
    margin: 24px auto;
    box-sizing: border-box;
  }
  #oferta-calc *, #oferta-calc *::before, #oferta-calc *::after { box-sizing: border-box; }
  #oferta-calc h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  #oferta-calc .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
  #oferta-calc label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  #oferta-calc select, #oferta-calc input[type="text"], #oferta-calc input[type="email"] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 14px; background: white; color: var(--ink);
  }
  #oferta-calc .row { margin-bottom: 20px; }
  #oferta-calc .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  #oferta-calc .checks { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
  #oferta-calc .checks label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink);
    background: white; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin: 0; }
  #oferta-calc .checks input { width: auto; }
  #oferta-calc .range-row { display: flex; align-items: center; gap: 12px; }
  #oferta-calc .range-row span { font-size: 14px; font-weight: 600; min-width: 40px; text-align: right; }
  #oferta-calc .result {
    background: white; border: 1px solid var(--line); border-radius: 12px;
    padding: 18px; margin: 24px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  #oferta-calc .result .metric-label { font-size: 12px; color: var(--muted); margin: 0 0 2px; }
  #oferta-calc .result .metric-value { font-size: 20px; font-weight: 600; margin: 0; }
  #oferta-calc button {
    width: 100%; padding: 13px; border-radius: 8px; border: none;
    background: var(--accent); color: var(--accent-ink); font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  #oferta-calc button:disabled { opacity: 0.6; cursor: default; }
  #oferta-calc #status { font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  #oferta-calc #status.ok { color: var(--accent); }
  #oferta-calc #status.err { color: #b23b3b; }
</style>

<h1>Cât ar costa aplicația ta?</h1>
<p class="sub">Estimare instant, orientativă — confirmată la discuția de discovery.</p>

<form id="ofertaForm">
  <div class="row">
    <label for="oc-projectType">Tip proiect</label>
    <select id="oc-projectType">
      <option value="site">Site de prezentare</option>
      <option value="shop">Magazin online</option>
      <option value="app" selected>Aplicație internă / business</option>
      <option value="complex">Aplicație cu integrări complexe</option>
    </select>
  </div>

  <div class="row">
    <label>Integrări necesare</label>
    <div class="checks">
      <label><input type="checkbox" value="anaf"> ANAF e-Factura</label>
      <label><input type="checkbox" value="payments"> Procesator de plăți</label>
      <label><input type="checkbox" value="auth"> Autentificare utilizatori</label>
      <label><input type="checkbox" value="api"> API extern (ERP, curier)</label>
    </div>
  </div>

  <div class="row">
    <label for="oc-users">Utilizatori concurenți estimați</label>
    <div class="range-row">
      <input type="range" id="oc-users" min="5" max="500" value="20" step="5" style="flex:1">
      <span id="oc-usersOut">20</span>
    </div>
  </div>

  <div class="row">
    <label><input type="checkbox" id="oc-maintenance" style="width:auto; margin-right:8px">Include mentenanță lunară</label>
  </div>

  <div class="result" id="oc-resultBox" style="display:none">
    <div><p class="metric-label">Preț estimat</p><p class="metric-value" id="oc-priceOut">–</p></div>
    <div><p class="metric-label">Durată</p><p class="metric-value" id="oc-daysOut">–</p></div>
  </div>

  <div class="row grid2">
    <div>
      <label for="oc-clientName">Numele tău</label>
      <input type="text" id="oc-clientName" required>
    </div>
    <div>
      <label for="oc-companyName">Firma ta</label>
      <input type="text" id="oc-companyName" required>
    </div>
  </div>
  <div class="row">
    <label for="oc-clientEmail">Email</label>
    <input type="email" id="oc-clientEmail" required>
  </div>

  <button type="submit" id="oc-submitBtn">Trimite-mi oferta pe email</button>
  <p id="status"></p>
</form>
</div>

<script>
(function () {
  // Adresa reală a backend-ului tău, găzduit pe Render.
  var API_BASE = "https://oferta-app.onrender.com";

  var usersInput = document.getElementById("oc-users");
  var usersOut = document.getElementById("oc-usersOut");
  usersInput.addEventListener("input", function () { usersOut.textContent = usersInput.value; });

  document.getElementById("ofertaForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var btn = document.getElementById("oc-submitBtn");
    var status = document.getElementById("status");
    btn.disabled = true;
    status.className = "";
    status.textContent = "Se generează oferta...";

    var integrations = Array.from(document.querySelectorAll("#oferta-calc .checks input:checked")).map(function (c) { return c.value; });

    var payload = {
      client_name: document.getElementById("oc-clientName").value,
      company_name: document.getElementById("oc-companyName").value,
      client_email: document.getElementById("oc-clientEmail").value,
      project_type: document.getElementById("oc-projectType").value,
      integrations: integrations,
      users: parseInt(usersInput.value, 10),
      maintenance: document.getElementById("oc-maintenance").checked,
      send_email: true,
    };

    fetch(API_BASE + "/generate-offer", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (res) {
        if (!res.ok) return res.json().then(function (d) { throw new Error(d.detail || "Eroare la server"); });
        return res.json();
      })
      .then(function (data) {
        document.getElementById("oc-resultBox").style.display = "grid";
        document.getElementById("oc-priceOut").textContent =
          data.offer.price_min.toLocaleString("ro-RO") + " – " + data.offer.price_max.toLocaleString("ro-RO") + " EUR";
        document.getElementById("oc-daysOut").textContent = data.offer.days + " zile";

        status.className = "ok";
        status.textContent = data.email_sent
          ? "Ofertă trimisă pe email. Verifică inbox-ul (și spam)."
          : "Ofertă generată.";
      })
      .catch(function (err) {
        status.className = "err";
        status.textContent = "Nu am putut genera oferta: " + err.message;
      })
      .finally(function () {
        btn.disabled = false;
      });
  });
})();
</script>
